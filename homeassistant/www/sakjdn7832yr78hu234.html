<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Control de Acceso</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h2 { margin-bottom: 8px; font-weight: 300; font-size: 1.4rem; }
        .status {
            margin-bottom: 24px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-unknown { background: #444; color: #aaa; }
        .status-armed { background: #ff4444; color: white; }
        .status-disarmed { background: #44bb44; color: white; }
        .container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-siren-stop {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            font-size: 1.1rem;
            padding: 22px;
            border: 2px solid #e68a00;
        }
        .btn-alarm-on { background: linear-gradient(135deg, #ff4444, #d32f2f); color: white; }
        .btn-alarm-off { background: linear-gradient(135deg, #44bb44, #388e3c); color: white; }
        .divider {
            border: none;
            border-top: 1px solid #333;
            margin: 8px 0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 100;
            text-align: center;
            max-width: 90%;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-success { background: #2e7d32; color: white; }
        .toast-error { background: #c62828; color: white; }
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 50;
            padding: 20px;
        }
        .confirm-overlay p {
            font-size: 1.1rem;
            text-align: center;
            margin: 0;
        }
        .confirm-buttons { display: flex; gap: 12px; }
        .confirm-buttons button { width: 140px; padding: 14px; font-size: 1rem; }
        .btn-confirm-yes { background: #ff4444; color: white; }
        .btn-confirm-no { background: #555; color: white; }
    </style>
</head>
<body>
    <h2>Alarma</h2>
    <div id="status" class="status status-unknown">Estado desconocido</div>

    <div class="container">
        <button class="btn-siren-stop" onclick="sendCommand('sirena')">APAGAR SIRENA</button>

        <hr class="divider">

        <button class="btn-alarm-on" onclick="confirmAction('activar')">ACTIVAR ALARMA</button>
        <button class="btn-alarm-off" onclick="sendCommand('desactivar')">DESACTIVAR ALARMA</button>
    </div>

    <div id="toast" class="toast"></div>
    <div id="confirmOverlay" class="confirm-overlay" style="display:none">
        <p>Vas a <strong>activar la alarma</strong>.<br>Tenes 60 segundos para salir.</p>
        <div class="confirm-buttons">
            <button class="btn-confirm-yes" onclick="sendCommand('activar')">Activar</button>
            <button class="btn-confirm-no" onclick="closeConfirm()">Cancelar</button>
        </div>
    </div>

    <script>
        const WEBHOOKS = {
            activar: '/api/webhook/X_AhNFT-mL6g519Sw_d2WPl9TJwQ3pNH',
            desactivar: '/api/webhook/DOULmPfn8km-0UUMPNjxjSE3UtDHQKnM',
            sirena: '/api/webhook/KnTbvOQogVPShquavni4MXRirJmtgyk3'
        };

        function confirmAction(action) {
            document.getElementById('confirmOverlay').style.display = 'flex';
        }

        function closeConfirm() {
            document.getElementById('confirmOverlay').style.display = 'none';
        }

        async function sendCommand(action) {
            closeConfirm();
            const buttons = document.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            try {
                const res = await fetch(WEBHOOKS[action], { method: 'POST' });
                if (res.ok || res.status === 200) {
                    showToast(getMensaje(action), 'success');
                    updateStatus(action);
                } else {
                    showToast('Error: ' + res.status, 'error');
                }
            } catch (err) {
                showToast('Error de conexion', 'error');
            } finally {
                buttons.forEach(b => b.disabled = false);
            }
        }

        function getMensaje(action) {
            const msgs = {
                activar: 'Alarma activada',
                desactivar: 'Alarma desactivada',
                sirena: 'Sirena apagada'
            };
            return msgs[action] || 'Comando enviado';
        }

        function updateStatus(action) {
            const el = document.getElementById('status');
            if (action === 'activar') {
                el.textContent = 'Armada';
                el.className = 'status status-armed';
            } else if (action === 'desactivar') {
                el.textContent = 'Desarmada';
                el.className = 'status status-disarmed';
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast toast-' + type + ' show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }
    </script>
</body>
</html>
